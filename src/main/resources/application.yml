spring:
  application:
    name: q-ai-agent
  profiles:
    active: local
  ai:
#    ollama:
#      base-url: http://localhost:11434
#      chat:
#        model: qwen3.5:4b
    mcp:
      client:
        enabled: true
        type: SYNC
        request-timeout: 300s
        toolcallback:
          enabled: true
        stdio:
          servers-configuration: classpath:mcp-servers.json
server:
  port: 8123
  servlet:
    context-path: /api
# springdoc-openapi 接口文档配置
springdoc:
      swagger-ui:
        path: /swagger-ui.html
        tags-sorter: alpha
        operations-sorter: alpha
      api-docs:
        path: /v3/api-docs
      group-configs:
        - group: 'default'
          paths-to-match: '/**'
          packages-to-scan: com.qiuji.qaiagent.controller
# knife4j的增强配置，不需要增强可以不配
knife4j:
  enable: true
  setting:
    language: zh_cn
